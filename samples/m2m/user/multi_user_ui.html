<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Multi User UI</title><style>
body{margin:0;background:#071126;color:#eaf2ff;font-family:Segoe UI,Arial,sans-serif}.top{padding:18px 24px;background:#070d20;border-bottom:1px solid #28406c}.wrap{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:420px 1fr;gap:18px}.card{background:#111a3a;border:1px solid #2e477a;border-radius:16px;padding:18px}.row{display:grid;grid-template-columns:100px 1fr;gap:10px;align-items:center;margin:10px 0}input,textarea,select{background:#0b1430;color:#fff;border:1px solid #36538e;border-radius:10px;padding:10px}textarea{min-height:120px}.btn{background:#00a884;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}.ghost{background:#1a2a5a}.msg{border:1px solid #2e477a;border-radius:14px;padding:12px;margin:10px 0;background:#0b1430}.mine{border-color:#159bff}.badge{display:inline-block;background:#073;border:1px solid #0e9;border-radius:999px;padding:5px 10px;font-weight:700}.small{color:#9db7e8;font-size:12px}pre{white-space:pre-wrap;background:#050a18;border-radius:12px;padding:12px;max-height:320px;overflow:auto}.users span{display:inline-block;margin:4px;padding:6px 10px;border-radius:999px;background:#172657;border:1px solid #36538e}</style></head><body>
<div class="top"><h2>KRXA 말대말 MULTI USER UI</h2><div class="small">room/user/message multi connect · v11</div></div>
<div class="wrap"><section class="card"><h3>사용자 / 방 설정</h3><div class="row"><label>Room</label><input id="room" value="room_default"></div><div class="row"><label>From</label><select id="from"><option>user_A</option><option>user_B</option><option>user_C</option></select></div><div class="row"><label>To</label><select id="to"><option>user_B</option><option>user_A</option><option>user_C</option></select></div><textarea id="text">안녕하세요. 멀티유저 연결 테스트입니다.</textarea><p><button class="btn" onclick="sendMsg()">전송</button> <button class="btn ghost" onclick="loadState()">새로고침</button></p><div class="small">엔진 실행: KRXA_MULTI_USER_RUN.bat</div></section>
<section class="card"><h3>실행 상태 <span id="status" class="badge">READY</span></h3><div class="users" id="users"></div><div id="messages"></div></section><section class="card" style="grid-column:1/-1"><h3>원본 multi_room_state.json</h3><pre id="raw">loading...</pre></section></div>
<script>
async function loadState(){const r=await fetch('/api/state');const s=await r.json();document.getElementById('status').textContent=s.state||'-';const roomId=document.getElementById('room').value||'room_default';const room=(s.rooms&&s.rooms[roomId])||Object.values(s.rooms||{})[0]||{users:[],messages:[]};document.getElementById('users').innerHTML=(room.users||[]).map(u=>`<span>${u}</span>`).join('');document.getElementById('messages').innerHTML=(room.messages||[]).slice().reverse().map(m=>`<div class="msg ${m.from===document.getElementById('from').value?'mine':''}"><b>${m.from} → ${m.to}</b> <span class="small">${m.intent} ${m.confidence}</span><br>${m.input}<hr><b>${m.output}</b></div>`).join('');document.getElementById('raw').textContent=JSON.stringify(s,null,2)}
async function sendMsg(){const body={room_id:room.value,from:from.value,to:to.value,text:text.value};await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});await loadState()}
loadState(); setInterval(loadState,3000);
</script></body></html>
