<!doctype html><html><head><meta charset="utf-8"><title>KRXAI INTERNAL WINDOW</title><style>
:root{font-family:Arial, sans-serif;background:#0f172a;color:#e5e7eb}body{margin:0;background:#0f172a;color:#e5e7eb}a{color:#93c5fd}button,input,textarea,select{font:inherit}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:8px 12px;cursor:pointer}button.secondary{background:#334155}.top{display:flex;gap:12px;align-items:center;padding:14px 18px;background:#111827;border-bottom:1px solid #334155}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;padding:16px}.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:16px;box-shadow:0 10px 25px rgba(0,0,0,.25)}pre{background:#020617;border:1px solid #334155;border-radius:12px;padding:12px;overflow:auto;white-space:pre-wrap}.muted{color:#94a3b8}.row{display:flex;gap:8px;flex-wrap:wrap}.input{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #475569;background:#020617;color:#e5e7eb;padding:10px}textarea.input{min-height:90px}.win{position:absolute;background:#1e293b;border:1px solid #475569;border-radius:14px;min-width:320px;min-height:220px;box-shadow:0 18px 40px rgba(0,0,0,.45);overflow:hidden}.title{background:#0f172a;padding:10px 12px;cursor:move;display:flex;justify-content:space-between;gap:8px}.content{padding:12px}.desktop{height:calc(100vh - 56px);position:relative;overflow:auto;background:radial-gradient(circle at top left,#1e3a8a 0,#0f172a 35%,#020617 100%)}
</style></head><body><div class="top"><b>KRXAI INTERNAL WINDOW</b><a href="/control">CONTROL</a><a href="/krxai">KRXAI</a><a href="/files">FILES</a></div><div class="grid"><div class="card"><h2>KRXAI 내부 논의</h2><p class="muted">외부 LLM 없이 KRXAI_DB + language_DB + memory_loop 기반으로 응답합니다.</p><textarea id="q" class="input">KRXA 구조 설명해</textarea><br><br><button onclick="ask()">내부 사고 실행</button><pre id="out"></pre></div><div class="card"><h2>상태</h2><button onclick="status()">상태 읽기</button><pre id="st"></pre></div></div><script>async function ask(){let r=await fetch('/api/krxai/internal/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:q.value,role:'krxai'})});out.textContent=JSON.stringify(await r.json(),null,2)}async function status(){let r=await fetch('/api/krxai/internal/status');st.textContent=JSON.stringify(await r.json(),null,2)}status();</script></body></html>
